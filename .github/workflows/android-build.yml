name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Скачивание кода
        uses: actions/checkout@v4

      - name: ⚙️ Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: ☕ Установка Java (нужна для Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 📦 Установка зависимостей
        run: npm install

      - name: 🏗 Сборка React
        run: npm run build

      - name: 🔄 Синхронизация Capacitor
        run: npx cap sync android

      - name: 🤖 Сборка APK (Debug версия)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Загрузка APK
        uses: actions/upload-artifact@v4
        with:
          name: Gudex-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk